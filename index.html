<!-- ===== HTML STRUCTURE ===== -->
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   ===== BASE LAYOUT =====
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #111;
  font-family: Arial, sans-serif;
}

/* =========================
   ===== LOADING BAR =====
========================= */
#loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  text-align: center;
  color: #aaa;
  font-size: 14px;
  letter-spacing: 1px;
  padding: 10px 0;
  background: #111;
  z-index: 1000;
}

/* =========================
   ===== CHAT CONTAINER =====
========================= */
#chat {
  margin-top: 50px;
  width: 95%;
  max-width: 400px;
 height: calc(var(--vh, 1vh) * 100 - 50px);

  background: #000;
  border-radius: 20px;

  display: flex;
  flex-direction: column;

  overflow: hidden;
  border: 1px solid #333;

  margin-left: auto;
  margin-right: auto;
}

/* =========================
   ===== MESSAGES AREA =====
========================= */
#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* =========================
   ===== CHAT BUBBLES =====
========================= */
.message {
  display: inline-block;
  padding: 8px 12px;
  margin: 4px 0;
  border-radius: 18px;
  font-size: 18px;
  max-width: 75%;
  word-wrap: break-word;
}

.user {
  background: #007aff;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.bot {
  background: #2c2c2e;
  color: white;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

/* =========================
   ===== INPUT AREA =====
========================= */
#input-area {
  display: flex;
  border-top: 1px solid #222;
  padding: 6px;
  background: #1c1c1e;
}

#userInput {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
  background: #111;
  color: white;
  font-size: 16px;
}

button {
  background: #007aff;
  color: white;
  border: none;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- ===== LOADING ===== -->
<div id="loading">loading blue chat<span id="dots">...</span></div>

<!-- ===== CHAT UI ===== -->
<div id="chat">
  <div id="messages"></div>
  <div id="input-area">
    <input id="userInput" type="text" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
   // ===== FIX MOBILE 100vh ISSUE =====
function setRealVH() {
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}

setRealVH();
window.addEventListener('resize', setRealVH);
/* =========================
   ===== STATE SETUP =====
========================= */
let state = "start";
let startConfusionCount = 0;

/* =========================
   ===== MESSAGE RENDERING =====
========================= */
function addMessage(text, sender) {
  const container = document.getElementById("messages");

  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.textContent = text;

  container.appendChild(msg);

  // slight delay prevents layout jump on mobile
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 50);
}

function addTypingBubble() {
  const container = document.getElementById("messages");

  const typing = document.createElement("div");
  typing.classList.add("message", "bot");
  typing.id = "typing";
  typing.textContent = "…";

  container.appendChild(typing);

  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 50);
}

function removeTypingBubble() {
  const typing = document.getElementById("typing");
  if (typing) typing.remove();
}

/* =========================
   ===== LOADING DOTS =====
========================= */
function animateDots() {
  const dots = document.getElementById("dots");
  let count = 0;

  return setInterval(() => {
    count = (count + 1) % 4;
    dots.textContent = ".".repeat(count || 1);
  }, 400);
}

/* =========================
   ===== BOT RESPONSE ENGINE =====
========================= */
function sendBotSequence(messages) {
  const loading = document.getElementById("loading");

  if (loading && loading.textContent.includes("loading")) {
    loading.textContent = "BLUE Chat";
  }

  let sequence = [];

  messages.forEach(msg => {
    if (Array.isArray(msg)) {
      const shouldSplit = msg.length > 1 && Math.random() < 0.4;

      if (shouldSplit) {
        msg.forEach(m => sequence.push(m));
      } else {
        sequence.push(msg.join(" "));
      }
    } else {
      sequence.push(msg);
    }
  });

  let totalDelay = 0;

  sequence.forEach(msg => {
    const delayBeforeTyping = 500 + Math.random() * 800;
    const typingDuration = 1200 + Math.random() * 800;

    totalDelay += delayBeforeTyping;

    setTimeout(() => addTypingBubble(), totalDelay);

    totalDelay += typingDuration;

    setTimeout(() => {
      removeTypingBubble();
      addMessage(msg, "bot");
    }, totalDelay);
  });
}

/* =========================
   ===== INPUT HANDLING =====
========================= */
function isEmoji(input) {
  return /[^\w\s]/.test(input);
}

function sendMessage() {
  const inputField = document.getElementById("userInput");
  let userText = inputField.value.trim();

  if (!userText) return;

  addMessage(userText, "user");
  inputField.value = "";

  const responseSequence = handleState(userText);
  sendBotSequence(responseSequence);
}

/* =========================
   ===== PUZZLE LOGIC =====
========================= */
function handleState(input) {

  if (state === "start") {
    if (!isEmoji(input)) {
      startConfusionCount++;

      if (startConfusionCount === 1) return [["🤨","❓"]];
      if (startConfusionCount === 2) return [["😅","❓❓"]];
      return [["🚫💬","🤓☝️💡","🫵⌨️🙂"]];
    }

    state = "emoji_discovered";

    return [
      ["👀","🏆","👂"],
      ["📍","🗺️🎨","❓"]
    ];
  }

  if (state === "emoji_discovered") {
    if (input === "😍") {
      state = "pattern_hint";
      return [["🙃","🫵","⏭️"]];
    }
    return [["🫵","📍🖼️🎩⬅️❓"]];
  }

  if (state === "pattern_hint") {
    if (input === "😐") {
      state = "final_hint";
      return [["💀","👁️","➡️"]];
    }
    return [["🤔","👀👀❓👆"]];
  }

  if (state === "final_hint") {
    if (input === "🫠") {
      state = "complete";
      return [["🎉","🔓","😭😬😂💩🤗"]];
    }
    return [["❓👀👁️🫵⏭️"]];
  }

  if (state === "complete") {
    return [["👋","🤫"]];
  }

  return [["🤔❓❓"]];
}

/* =========================
   ===== INITIAL LOAD =====
========================= */
window.addEventListener("DOMContentLoaded", () => {
  const dotAnimation = animateDots();

  const loadingTime = 700 + Math.random() * 1000;

  setTimeout(() => {
    clearInterval(dotAnimation);

    const delay = 1500 + Math.random() * 1500;

    // extra buffer prevents first message cutoff
    setTimeout(() => {
      sendBotSequence([["👀👋❓"]]);
    }, delay + 300);

  }, loadingTime);
});
</script>

</body>
</html>
